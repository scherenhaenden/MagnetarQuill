<div class="toolbar">

  <!-- Toggle HTML View Button -->
  <button (mousedown)="$event.preventDefault()" (click)="onToggleHtmlView()" title="Toggle HTML View">
    Toggle HTML View
  </button>

  <select aria-label="Font Family" [value]="formattingService.currentFontFamily()" (change)="onFontFamilyChange($event)">
    <option value=""></option>
    <option value="Arial">Arial</option>
    <option value="Times New Roman">Times New Roman</option>
    <option value="Courier New">Courier New</option>
    <!-- Add more fonts as needed -->
  </select>

  <select aria-label="Font Size" [value]="formattingService.currentFontSize()" (change)="onFontSizeChange($event)">
    <option value=""></option>
    <option value="12px">12px</option>
    <option value="14px">14px</option>
    <option value="16px">16px</option>
    <option value="18px">18px</option>
    <option value="20px">20px</option>
    <!-- Add more sizes as needed -->
  </select>

  <button (mousedown)="$event.preventDefault()" (click)="clearFormatting()" title="Clear Formatting">Clear</button>

  <label for="textColorInput" class="sr-only">Text Color</label>
  <input id="textColorInput" [value]="formattingService.currentTextColor()" type="color" (change)="onTextColorChange($event)" title="Text Color" aria-label="Text Color">
  <label for="backgroundColorInput" class="sr-only">Background Color</label>
  <input id="backgroundColorInput" type="color" (change)="onBackgroundColorChange($event)" title="Background Color" aria-label="Background Color">

  <button
    (mousedown)="$event.preventDefault()"
    (click)="toggleStrong()"
    [class.active]="formattingService.strongActive()"
    title="Bold">
    <b>Strong</b>
  </button>

  <button
    (mousedown)="$event.preventDefault()"
    (click)="toggleBold()"
    [class.active]="formattingService.boldActive()"
    title="Bold">
    <b>B</b>
  </button>

  <button
    (mousedown)="$event.preventDefault()"
    (click)="toggleItalic()"
    [class.active]="formattingService.italicActive()"
    title="Italic">
    <i>I</i>
  </button>

  <button
    (mousedown)="$event.preventDefault()"
    (click)="toggleUnderline()"
    [class.active]="formattingService.underlineActive()"
    title="Underline">
    <u>U</u>
  </button>

  <button
    (mousedown)="$event.preventDefault()"
    (click)="toggleStrikethrough()"
    [class.active]="formattingService.strikethroughActive()"
    title="Strikethrough">
    <s>S</s>
  </button>


  <button (mousedown)="$event.preventDefault()" (click)="setTextAlign('left')" title="Align Left">Left</button>
  <button (mousedown)="$event.preventDefault()" (click)="setTextAlign('center')" title="Align Center">Center</button>
  <button (mousedown)="$event.preventDefault()" (click)="setTextAlign('right')" title="Align Right">Right</button>
  <button (mousedown)="$event.preventDefault()" (click)="setTextAlign('justify')" title="Justify">Justify</button>

  <!-- ./components/toolbar/toolbar.component.html -->
  <label for="lineSpacingSelect" class="sr-only">Line Spacing</label>
  <select id="lineSpacingSelect" (change)="setLineSpacing($event)">
    <option value="1.0">1.0</option>
    <option value="1.15">1.15</option>
    <option value="1.5">1.5</option>
    <option value="2.0">2.0</option>
  </select>

  <!-- Ordered and Unordered List Buttons -->
  <button (mousedown)="$event.preventDefault()" (click)="toggleOrderedList()" title="Ordered List">
    <span>1.</span>
  </button>
  <button (mousedown)="$event.preventDefault()" (click)="toggleUnorderedList()" title="Unordered List">
    <span>&bull;</span>
  </button>


  <!-- ./components/toolbar/toolbar.component.html -->
  <button (mousedown)="$event.preventDefault()" (click)="toggleSuperscript()" title="Superscript">Sup</button>
  <button (mousedown)="$event.preventDefault()" (click)="toggleSubscript()" title="Subscript">Sub</button>

  <!-- Header Level Dropdown -->
  <label for="headerLevelSelect" class="sr-only">Header Level</label>
  <select id="headerLevelSelect" (change)="applyHeader($event)" title="Header Level">
    <option value="" selected>Normal</option>
    <option value="h1">H1</option>
    <option value="h2">H2</option>
    <option value="h3">H3</option>
    <option value="h4">H4</option>
    <option value="h5">H5</option>
    <option value="h6">H6</option>
  </select>

  <button (mousedown)="$event.preventDefault()" (click)="openImageModal()">Insert Image</button>

  <!-- Theme Selector -->
  <select aria-label="Editor Theme" [value]="theme" (change)="onThemeChange($event)" title="Theme Select">
    <option value="light">☀️ Light</option>
    <option value="dark">🌙 Dark</option>
    <option value="custom">🎨 Custom</option>
  </select>

  <!-- File Operations -->
  <input type="file" #fileInput (change)="onFileSelected($event)" accept=".html,.htm,.rtf,.md,.markdown" style="display: none" aria-label="Upload File">
  <button (mousedown)="$event.preventDefault()" (click)="triggerFileInput(fileInput)" title="Load File">Load File</button>
  <button (mousedown)="$event.preventDefault()" (click)="exportHtml()" title="Export HTML">Export HTML</button>
  <button (mousedown)="$event.preventDefault()" (click)="exportMarkdown()" title="Export Markdown">Export Markdown</button>
  <button (mousedown)="$event.preventDefault()" (click)="exportRtf()" title="Export RTF">Export RTF</button>
  <button (mousedown)="$event.preventDefault()" (click)="parseMarkdown()" title="Parse Markdown">Parse Markdown</button>
  <button (mousedown)="$event.preventDefault()" (click)="showTableModal = true" title="Insert Table">Insert Table</button>

  <ng-container *ngIf="tableService.activeCell()">
    <button (mousedown)="$event.preventDefault()" (click)="tableService.addRowAbove()" title="Add Row Above">Add Row Above</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.addRowBelow()" title="Add Row Below">Add Row Below</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.deleteRow()" title="Delete Row">Delete Row</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.addColumnBefore()" title="Add Column Before">Add Col Before</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.addColumnAfter()" title="Add Column After">Add Col After</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.deleteColumn()" title="Delete Column">Delete Col</button>
    
    <button (mousedown)="$event.preventDefault()" (click)="tableService.setCellAlignment('left')" title="Align Cell Left">Cell Left</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.setCellAlignment('center')" title="Align Cell Center">Cell Center</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.setCellAlignment('right')" title="Align Cell Right">Cell Right</button>
    
    <button (mousedown)="$event.preventDefault()" (click)="tableService.setCellVerticalAlignment('top')" title="Align Cell Top">Cell Top</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.setCellVerticalAlignment('middle')" title="Align Cell Middle">Cell Middle</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.setCellVerticalAlignment('bottom')" title="Align Cell Bottom">Cell Bottom</button>

    <select (change)="onCellBorderChange($event)" title="Cell Border Style">
      <option value="solid">Solid Border</option>
      <option value="dashed">Dashed Border</option>
      <option value="none">No Border</option>
    </select>

    <input type="color" (change)="onCellBgColorChange($event)" title="Cell Background Color" />

    <button (mousedown)="$event.preventDefault()" (click)="tableService.mergeRight()" title="Merge Right">Merge Right</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.mergeDown()" title="Merge Down">Merge Down</button>
    <button (mousedown)="$event.preventDefault()" (click)="tableService.splitCell()" title="Split Cell">Split Cell</button>
  </ng-container>

</div>


<lib-image-modal

  *ngIf="showImageModal"
  [isEditMode]="showImageModal"
  [(imageModalComponentModel)]="imageModalComponentModel"
  (cancel)="showImageModal = false"

></lib-image-modal>

<lib-table-modal
  *ngIf="showTableModal"
  (cancel)="showTableModal = false"
  (submit)="onTableSubmit($event)"
></lib-table-modal>

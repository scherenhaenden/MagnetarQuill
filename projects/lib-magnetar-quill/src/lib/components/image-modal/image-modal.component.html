<div *ngIf="true" class="modal-overlay">

  <div class="modal-content"
       libClickOutside
       (clickOutside)="onCancel()"
  >
    <h3>{{ isEditMode ? 'Edit Image Properties' : 'Insert Image from URL' }}</h3>
    <div class="modal-body">
      <!-- Left Preview Section -->
      <div class="preview">
        <h4>Preview</h4>
        <img [src]="imageModalComponentModel.url"
             [alt]="imageModalComponentModel.alt || 'Image preview'"
             [style.width.px]="imageModalComponentModel.width"
             [style.height.px]="imageModalComponentModel.height"
             [style.borderWidth.px]="imageModalComponentModel.border"
             [style.padding]="imageModalComponentModel.hPadding + 'px ' + imageModalComponentModel.vPadding + 'px'"
             [style.textAlign]="imageModalComponentModel.alignment" />
      </div>
      <!-- Right Form Section -->
      <div class="form-section">
        <label for="imageUrlInput">URL*</label>
        <input id="imageUrlInput" type="text" [(ngModel)]="imageModalComponentModel.url" placeholder="Enter Image URL" required />

        <label for="imageAltInput">Alternative Text</label>
        <input id="imageAltInput" type="text" [(ngModel)]="imageModalComponentModel.alt" placeholder="Image description" />

        <label for="imageWidthInput">Width</label>
        <input id="imageWidthInput" type="number" [(ngModel)]="imageModalComponentModel.width" placeholder="Width" (input)="updateHeight()" />

        <label>
          <input type="checkbox" [(ngModel)]="maintainAspectRatio" (change)="toggleAspectRatio()" />
          Maintain Aspect Ratio
        </label>

        <label for="imageHeightInput">Height</label>
        <input id="imageHeightInput" type="number" [(ngModel)]="imageModalComponentModel.height" placeholder="Height" [readonly]="maintainAspectRatio" />


        <label for="imageBorderInput">Border</label>
        <input id="imageBorderInput" type="number" [(ngModel)]="imageModalComponentModel.border" placeholder="Border width" />

        <label for="imageHPaddingInput">Horizontal Padding</label>
        <input id="imageHPaddingInput" type="number" [(ngModel)]="imageModalComponentModel.hPadding" placeholder="Horizontal padding" />

        <label for="imageVPaddingInput">Vertical Padding</label>
        <input id="imageVPaddingInput" type="number" [(ngModel)]="imageModalComponentModel.vPadding" placeholder="Vertical padding" />

        <label for="imageAlignmentSelect">Alignment</label>
        <select id="imageAlignmentSelect" [(ngModel)]="imageModalComponentModel.alignment">
          <option value="left">Left</option>
          <option value="center">Center</option>
          <option value="right">Right</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button (click)="onSubmit()">{{ isEditMode ? 'Save' : 'Insert' }}</button>
      <button (click)="onCancel()">Cancel</button>
    </div>
  </div>
</div>
